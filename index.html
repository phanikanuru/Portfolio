              <button onClick={() => setActive("experience")} onMouseOver={e=>{e.currentTarget.style.background="rgba(255,255,255,0.85)"}} onMouseOut={e=>{e.currentTarget.style.background="#fff"}} style={{ display:"flex", alignItems:"center", gap:8, padding:"12px 28px", background:"#fff", color:"#141414", fontSize:16, fontWeight:700, border:"none", cursor:"pointer", borderRadius:4, transition:"all 0.2s" }}>
                <span>▶</span> View Profile
              </button>
              <button onClick={() => setActive("contact")} onMouseOver={e=>{e.currentTarget.style.background="rgba(109,109,110,0.5)"}} onMouseOut={e=>{e.currentTarget.style.background="rgba(109,109,110,0.7)"}} style={{ display:"flex", alignItems:"center", gap:8, padding:"12px 28px", background:"rgba(109,109,110,0.7)", color:"#fff", fontSize:16, fontWeight:700, border:"none", cursor:"pointer", borderRadius:4, transition:"all 0.2s" }}>
                <span>ⓘ</span> More Info
              </button>
            </div>
            <div style={{ display:"flex", gap:10, marginTop:28, flexWrap:"wrap" }}>
              {[".NET Core","Java","Kafka","AWS","React","Kubernetes"].map(t => (
                <span key={t} style={{ fontSize:11, color:"rgba(255,255,255,0.5)", border:"1px solid rgba(255,255,255,0.2)", padding:"3px 10px", borderRadius:2 }}>{t}</span>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function ExpCard({ item, isOpen, onClick }) {
      return (
        <div onClick={onClick} onMouseOver={e=>{ if(!isOpen) e.currentTarget.style.border="1px solid rgba(255,255,255,0.2)"; }} onMouseOut={e=>{ if(!isOpen) e.currentTarget.style.border="1px solid rgba(255,255,255,0.07)"; }} style={{ background:isOpen?"#1f1f1f":"#181818", border:`1px solid ${isOpen?"#e50914":"rgba(255,255,255,0.07)"}`, borderRadius:6, cursor:"pointer", transition:"all 0.25s", overflow:"hidden" }}>
          <div style={{ padding:"24px 28px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div>
                <div style={{ fontSize:11, color:"#e50914", letterSpacing:2, marginBottom:6, textTransform:"uppercase" }}>{item.period}</div>
                <h3 style={{ fontFamily:"'Arial Black',sans-serif", fontSize:20, color:"#fff", fontWeight:900, margin:"0 0 4px" }}>{item.company}</h3>
                <p style={{ fontSize:13, color:"rgba(255,255,255,0.5)", margin:0 }}>{item.role} · {item.location}</p>
              </div>
              <div style={{ width:32, height:32, borderRadius:"50%", background:isOpen?"#e50914":"rgba(255,255,255,0.1)", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:16, flexShrink:0, transition:"all 0.2s", transform:isOpen?"rotate(180deg)":"rotate(0deg)" }}>▾</div>
            </div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:14 }}>
              {item.tags.map(t => <span key={t} style={{ fontSize:12, background:"rgba(229,9,20,0.15)", color:"#e50914", border:"1px solid rgba(229,9,20,0.3)", padding:"3px 10px", borderRadius:2 }}>{t}</span>)}
            </div>
          </div>
          {isOpen && (
            <div style={{ padding:"0 28px 24px", borderTop:"1px solid rgba(255,255,255,0.07)" }}>
              <ul style={{ listStyle:"none", padding:0, margin:"16px 0 0" }}>
                {item.highlights.map((h,i) => (
                  <li key={i} style={{ display:"flex", gap:12, marginBottom:12 }}>
                    <span style={{ color:"#e50914", fontSize:14, flexShrink:0 }}>▸</span>
                    <span style={{ fontSize:13, color:"rgba(255,255,255,0.65)", lineHeight:1.7 }}>{h}</span>
                  </li>
                ))}
              </ul>
            </div>
          )}
        </div>
      );
    }

    function Experience() {
      const [open, setOpen] = useState(0);
      return (
        <section style={{ minHeight:"100vh", background:"#141414", padding:"100px 48px 80px" }}>
          <p style={{ fontSize:11, letterSpacing:3, color:"#e50914", marginBottom:10, textTransform:"uppercase" }}>— Now Streaming</p>
          <h2 style={{ fontFamily:"'Arial Black',sans-serif", fontSize:"clamp(28px,4vw,44px)", color:"#fff", fontWeight:900, marginBottom:32 }}>Experience</h2>
          <div style={{ display:"flex", flexDirection:"column", gap:12, maxWidth:860 }}>
            {experience.map((e,i) => <ExpCard key={e.id} item={e} isOpen={open===i} onClick={() => setOpen(open===i?-1:i)}/>)}
          </div>
          <div style={{ marginTop:64 }}>
            <p style={{ fontSize:11, letterSpacing:3, color:"#e50914", marginBottom:10, textTransform:"uppercase" }}>— Origins</p>
            <h3 style={{ fontFamily:"'Arial Black',sans-serif", fontSize:22, color:"#fff", fontWeight:900, marginBottom:24 }}>Education</h3>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, maxWidth:860 }}>
              {education.map(ed => (
                <div key={ed.school} style={{ background:"#181818", border:"1px solid rgba(255,255,255,0.07)", borderRadius:6, padding:"24px 28px" }}>
                  <div style={{ fontSize:11, color:"#e50914", letterSpacing:2, marginBottom:8, textTransform:"uppercase" }}>{ed.period}</div>
                  <div style={{ fontFamily:"'Arial Black',sans-serif", fontSize:16, color:"#fff", fontWeight:900, marginBottom:6 }}>{ed.degree}</div>
                  <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)" }}>{ed.school}</div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.3)", marginTop:4 }}>{ed.location}</div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Skills() {
      const [hov, setHov] = useState(null);
      return (
        <section style={{ minHeight:"100vh", background:"#141414", padding:"100px 48px 80px" }}>
          <p style={{ fontSize:11, letterSpacing:3, color:"#e50914", marginBottom:10, textTransform:"uppercase" }}>— Tech Stack</p>
          <h2 style={{ fontFamily:"'Arial Black',sans-serif", fontSize:"clamp(28px,4vw,44px)", color:"#fff", fontWeight:900, marginBottom:8 }}>Skills & Tools</h2>
          <p style={{ fontSize:14, color:"rgba(255,255,255,0.4)", marginBottom:40 }}>Hover to highlight · Scroll rows to explore</p>
          {skillRows.map(row => (
            <div key={row.category} style={{ marginBottom:36 }}>
              <h3 style={{ fontSize:15, fontWeight:700, color:"rgba(255,255,255,0.7)", marginBottom:14 }}>{row.category}</h3>
              <div style={{ display:"flex", gap:10, overflowX:"auto", paddingBottom:8 }}>
                {row.items.map(item => (
                  <div key={item} onMouseEnter={()=>setHov(item)} onMouseLeave={()=>setHov(null)} style={{ flexShrink:0, background:hov===item?"#e50914":"#1f1f1f", border:`1px solid ${hov===item?"#e50914":"rgba(255,255,255,0.1)"}`, borderRadius:4, padding:"10px 18px", fontSize:13, color:hov===item?"#fff":"rgba(255,255,255,0.7)", cursor:"default", transition:"all 0.18s", transform:hov===item?"scale(1.06)":"scale(1)" }}>{item}</div>
                ))}
              </div>
            </div>
          ))}
          <div style={{ marginTop:24, paddingTop:40, borderTop:"1px solid rgba(255,255,255,0.07)" }}>
            <p style={{ fontSize:11, letterSpacing:3, color:"#e50914", marginBottom:20, textTransform:"uppercase" }}>— Credentials</p>
            <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>
              {[{name:"AWS Certified Solutions Architect",level:"Associate",icon:"☁️"},{name:"Oracle Certified Java SE 11",level:"Developer",icon:"☕"}].map(c => (
                <div key={c.name} style={{ background:"#1f1f1f", border:"1px solid rgba(229,9,20,0.25)", borderRadius:6, padding:"18px 24px", display:"flex", alignItems:"center", gap:14 }}>
                  <span style={{ fontSize:22 }}>{c.icon}</span>
                  <div>
                    <div style={{ fontFamily:"'Arial Black',sans-serif", fontSize:13, color:"#fff", fontWeight:700 }}>{c.name}</div>
                    <div style={{ fontSize:11, color:"#e50914", marginTop:4 }}>{c.level}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Contact() {
      const [copied, setCopied] = useState(false);
      const email = "Phani.tech11@gmail.com";
      const copy = () => { navigator.clipboard.writeText(email); setCopied(true); setTimeout(()=>setCopied(false),2000); };
      return (
        <section style={{ minHeight:"100vh", background:"#141414", display:"flex", flexDirection:"column", justifyContent:"center", padding:"100px 48px 80px", position:"relative", overflow:"hidden" }}>
          <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", width:600, height:600, background:"radial-gradient(circle,rgba(229,9,20,0.08) 0%,transparent 70%)", pointerEvents:"none" }}/>
          <div style={{ maxWidth:620, position:"relative", zIndex:1 }}>
            <p style={{ fontSize:11, letterSpacing:3, color:"#e50914", marginBottom:10, textTransform:"uppercase" }}>— Get In Touch</p>
            <h2 style={{ fontFamily:"'Arial Black',sans-serif", fontSize:"clamp(28px,5vw,60px)", color:"#fff", fontWeight:900, letterSpacing:-1, marginBottom:20 }}>Let's Build<br/>Something Great.</h2>
            <p style={{ fontSize:15, lineHeight:1.8, color:"rgba(255,255,255,0.45)", marginBottom:56, maxWidth:480 }}>Open to senior full-stack or backend-leaning engineering roles where systems are complex and ownership is real. I respond within 48 hours.</p>
            <div style={{ display:"flex", alignItems:"stretch", marginBottom:40, border:"1px solid rgba(255,255,255,0.1)", borderRadius:4, overflow:"hidden" }}>
              <span style={{ fontSize:14, color:"#fff", flex:1, padding:"16px 20px", background:"#1f1f1f" }}>{email}</span>
              <button onClick={copy} style={{ fontSize:12, fontWeight:700, letterSpacing:1, padding:"16px 22px", background:copied?"#2ecc71":"#e50914", color:"#fff", border:"none", cursor:"pointer", textTransform:"uppercase", transition:"background 0.2s", whiteSpace:"nowrap" }}>{copied?"✓ Copied":"Copy"}</button>
            </div>
            <div style={{ display:"flex", gap:24, flexWrap:"wrap" }}>
              {[
                {label:"GitHub", href:"https://github.com/phanikanuru"},
                {label:"LinkedIn", href:"https://linkedin.com/in/phani-kanuru1t478"},
                {label:"+1 331 213 8674", href:"tel:+13312138674"},
              ].map(s => (
                <a key={s.label} href={s.href} target="_blank" rel="noopener noreferrer" onMouseOver={e=>{e.currentTarget.style.color="#e50914";e.currentTarget.style.borderColor="#e50914"}} onMouseOut={e=>{e.currentTarget.style.color="rgba(255,255,255,0.45)";e.currentTarget.style.borderColor="rgba(255,255,255,0.15)"}} style={{ fontSize:13, color:"rgba(255,255,255,0.45)", textDecoration:"none", borderBottom:"1px solid rgba(255,255,255,0.15)", paddingBottom:2, transition:"color 0.2s,border-color 0.2s" }}>{s.label} ↗</a>
              ))}
            </div>
          </div>
          <div style={{ position:"absolute", bottom:32, left:48, right:48, display:"flex", justifyContent:"space-between", borderTop:"1px solid rgba(255,255,255,0.07)", paddingTop:20 }}>
            <span style={{ fontSize:11, color:"rgba(255,255,255,0.18)", letterSpacing:1 }}>© 2026 PHANI KANURU</span>
            <span style={{ fontSize:11, color:"rgba(229,9,20,0.5)", letterSpacing:1 }}>CHICAGO, IL · OPEN TO WORK</span>
          </div>
        </section>
      );
    }

    function App() {
      const [active, setActive] = useState("home");
      const render = () => {
        if (active==="home") return <Home setActive={setActive}/>;
        if (active==="experience") return <Experience/>;
        if (active==="skills") return <Skills/>;
        if (active==="contact") return <Contact/>;
      };
      return (
        <div style={{ background:"#141414", minHeight:"100vh", color:"#fff" }}>
          <Nav active={active} setActive={setActive}/>
          {render()}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
